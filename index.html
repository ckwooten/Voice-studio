<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Memo Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #0e0e0f;
–surface2: #1e1e21;
–border: #2a2a2e;
–accent: #c8a96e;
–accent2: #7eb8c8;
–text: #e8e6e0;
–muted: #7a7870;
–danger: #c86e6e;
–success: #6ec89a;
}

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
min-height: 100vh;
display: flex;
flex-direction: column;
}

header {
padding: 1.25rem 1.5rem 1rem;
border-bottom: 1px solid var(–border);
display: flex;
align-items: baseline;
gap: 1rem;
}

header h1 {
font-family: ‘Playfair Display’, serif;
font-size: 1.5rem;
font-weight: 700;
color: var(–accent);
}

header span {
font-family: ‘DM Mono’, monospace;
font-size: 0.62rem;
color: var(–muted);
letter-spacing: 0.15em;
text-transform: uppercase;
}

.main {
display: flex;
flex-direction: column;
flex: 1;
}

.panel-section {
padding: 0.9rem 1.25rem;
border-bottom: 1px solid var(–border);
}

.panel-label {
font-family: ‘DM Mono’, monospace;
font-size: 0.6rem;
letter-spacing: 0.15em;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 0.5rem;
display: flex;
align-items: center;
gap: 0.4rem;
}

.saved-badge {
background: rgba(110,200,154,0.15);
color: var(–success);
font-size: 0.55rem;
padding: 0.1rem 0.3rem;
border-radius: 3px;
}

.key-input-wrap { position: relative; }

.key-input-wrap input {
width: 100%;
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 6px;
padding: 0.5rem 2.5rem 0.5rem 0.75rem;
color: var(–text);
font-family: ‘DM Mono’, monospace;
font-size: 0.68rem;
outline: none;
transition: border-color 0.2s;
}

.key-input-wrap input:focus { border-color: var(–accent); }

.key-input-wrap button {
position: absolute;
right: 0.5rem;
top: 50%;
transform: translateY(-50%);
background: none;
border: none;
color: var(–muted);
cursor: pointer;
font-size: 0.8rem;
padding: 0.2rem;
}

.upload-btn {
width: 100%;
padding: 1rem;
border: 1.5px dashed var(–border);
border-radius: 8px;
background: transparent;
color: var(–accent);
font-family: ‘DM Sans’, sans-serif;
font-size: 0.85rem;
font-weight: 500;
cursor: pointer;
transition: border-color 0.2s, background 0.2s;
display: flex;
align-items: center;
justify-content: center;
gap: 0.5rem;
}

.upload-btn:hover, .upload-btn:active {
border-color: var(–accent);
background: rgba(200,169,110,0.05);
}

#file-input { display: none; }

.iphone-tip {
background: rgba(126,184,200,0.07);
border: 1px solid rgba(126,184,200,0.2);
border-radius: 6px;
padding: 0.55rem 0.75rem;
font-size: 0.7rem;
color: var(–accent2);
line-height: 1.55;
margin-top: 0.6rem;
}

.file-list {
display: flex;
flex-direction: column;
gap: 0.3rem;
}

.file-item {
display: flex;
align-items: center;
gap: 0.5rem;
padding: 0.5rem 0.6rem;
border-radius: 6px;
cursor: pointer;
border: 1px solid transparent;
transition: background 0.15s;
}

.file-item:hover { background: var(–surface2); }
.file-item.active { background: var(–surface2); border-color: var(–accent); }
.file-item .file-name { font-size: 0.75rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.file-status {
font-size: 0.58rem;
font-family: ‘DM Mono’, monospace;
padding: 0.1rem 0.3rem;
border-radius: 3px;
flex-shrink: 0;
}

.status-ready { color: var(–muted); background: var(–surface2); }
.status-processing { color: var(–accent2); background: rgba(126,184,200,0.1); }
.status-done { color: var(–success); background: rgba(110,200,154,0.1); }
.status-error { color: var(–danger); background: rgba(200,110,110,0.1); }

.btn {
width: 100%;
padding: 0.65rem 1rem;
border-radius: 8px;
border: none;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
font-size: 0.82rem;
font-weight: 500;
transition: all 0.2s;
display: flex;
align-items: center;
justify-content: center;
gap: 0.5rem;
}

.btn-primary { background: var(–accent); color: #0e0e0f; }
.btn-primary:hover { background: #d4b87a; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-ghost { background: var(–surface2); color: var(–text); border: 1px solid var(–border); }
.btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; }

.toolbar {
display: flex;
align-items: center;
gap: 0.5rem;
padding: 0.75rem 1.25rem;
border-bottom: 1px solid var(–border);
flex-wrap: wrap;
}

.toolbar-label {
font-family: ‘DM Mono’, monospace;
font-size: 0.6rem;
letter-spacing: 0.15em;
text-transform: uppercase;
color: var(–muted);
width: 100%;
margin-bottom: 0.2rem;
}

.tool-btn {
padding: 0.38rem 0.75rem;
border-radius: 6px;
border: 1px solid var(–border);
background: var(–surface2);
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
font-size: 0.72rem;
cursor: pointer;
transition: all 0.15s;
white-space: nowrap;
}

.tool-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.tool-btn:not(:disabled):hover { border-color: var(–accent2); color: var(–accent2); }

#transcript {
width: 100%;
flex: 1;
background: transparent;
border: none;
outline: none;
resize: none;
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
font-size: 0.9rem;
line-height: 1.75;
caret-color: var(–accent);
padding: 1.25rem;
min-height: 200px;
}

#transcript::placeholder { color: var(–muted); font-style: italic; }

.ai-panel {
border-top: 1px solid var(–border);
padding: 0.85rem 1.25rem;
display: flex;
flex-direction: column;
gap: 0.6rem;
}

.ai-row { display: flex; gap: 0.6rem; align-items: flex-end; }

#ai-prompt {
flex: 1;
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 8px;
padding: 0.55rem 0.85rem;
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
font-size: 0.8rem;
outline: none;
resize: none;
height: 52px;
line-height: 1.5;
transition: border-color 0.2s;
}

#ai-prompt:focus { border-color: var(–accent2); }
#ai-prompt::placeholder { color: var(–muted); font-size: 0.75rem; }

.ai-send-btn {
padding: 0.55rem 1rem;
background: var(–accent2);
color: #0e0e0f;
border: none;
border-radius: 8px;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
font-size: 0.78rem;
font-weight: 500;
white-space: nowrap;
}

.ai-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

#ai-result {
background: rgba(126,184,200,0.07);
border: 1px solid rgba(126,184,200,0.2);
border-radius: 8px;
padding: 0.85rem 1rem;
font-size: 0.8rem;
line-height: 1.65;
color: var(–text);
display: none;
white-space: pre-wrap;
max-height: 200px;
overflow-y: auto;
}

#ai-result.visible { display: block; }

.ai-result-actions { display: none; gap: 0.4rem; flex-wrap: wrap; }
.ai-result-actions.visible { display: flex; }

.result-action-btn {
padding: 0.3rem 0.6rem;
border-radius: 5px;
border: 1px solid var(–border);
background: var(–surface2);
color: var(–text);
font-size: 0.7rem;
cursor: pointer;
}

/* Progress overlay */
#progress-overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(14,14,15,0.85);
z-index: 500;
align-items: center;
justify-content: center;
flex-direction: column;
gap: 1rem;
}

#progress-overlay.visible { display: flex; }

.progress-box {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 12px;
padding: 2rem;
text-align: center;
max-width: 280px;
width: 90%;
}

.progress-box p { font-size: 0.85rem; color: var(–text); margin-bottom: 0.5rem; }
.progress-box small { font-size: 0.72rem; color: var(–muted); }

.progress-bar-wrap {
height: 4px;
background: var(–border);
border-radius: 2px;
margin-top: 1rem;
overflow: hidden;
}

.progress-bar-fill {
height: 100%;
background: var(–accent);
border-radius: 2px;
width: 0%;
transition: width 0.3s;
}

@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
width: 28px; height: 28px;
border: 3px solid var(–border);
border-top-color: var(–accent);
border-radius: 50%;
animation: spin 0.8s linear infinite;
margin: 0 auto 1rem;
}

#toast {
position: fixed;
bottom: 1.25rem;
left: 50%;
transform: translateX(-50%) translateY(10px);
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 8px;
padding: 0.65rem 1.1rem;
font-size: 0.78rem;
color: var(–text);
opacity: 0;
transition: all 0.3s;
z-index: 9999;
white-space: nowrap;
}

#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(–border); border-radius: 2px; }
</style>

</head>
<body>

<header>
  <h1>Voice Memo Studio</h1>
  <span>v3 · iOS Fixed</span>
</header>

<div class="main">

  <!-- Keys -->

  <div class="panel-section">
    <div class="panel-label">
      OpenAI Key
      <span class="saved-badge" id="openai-badge" style="display:none">SAVED</span>
    </div>
    <div class="key-input-wrap">
      <input type="password" id="openai-key" placeholder="sk-..." autocomplete="off" oninput="saveKeys()">
      <button onclick="toggleKey('openai-key')">👁</button>
    </div>
  </div>

  <div class="panel-section">
    <div class="panel-label">
      Anthropic Key
      <span class="saved-badge" id="anthropic-badge" style="display:none">SAVED</span>
    </div>
    <div class="key-input-wrap">
      <input type="password" id="anthropic-key" placeholder="sk-ant-..." autocomplete="off" oninput="saveKeys()">
      <button onclick="toggleKey('anthropic-key')">👁</button>
    </div>
  </div>

  <!-- Upload -->

  <div class="panel-section">
    <div class="panel-label">Upload Audio</div>
    <button class="upload-btn" onclick="document.getElementById('file-input').click()">
      🎙️ &nbsp;Choose Audio File(s)
    </button>
    <input type="file" id="file-input" accept="audio/*,.m4a,.mp3,.wav,.caf" multiple>
    <div class="iphone-tip">
      📱 <strong>iPhone:</strong> Open Voice Memos → tap memo → <strong>•••</strong> → <em>Save to Files</em> → then choose that file here.
    </div>
  </div>

  <!-- File list -->

  <div class="panel-section">
    <div class="panel-label">Files</div>
    <div class="file-list" id="file-list">
      <div style="color:var(--muted); font-size:0.73rem; padding:0.5rem 0;">No files added yet</div>
    </div>
  </div>

  <div class="panel-section" style="display:flex; gap:0.6rem;">
    <button class="btn btn-primary" id="transcribe-btn" disabled onclick="transcribeSelected()">Transcribe Selected</button>
    <button class="btn btn-ghost" id="transcribe-all-btn" disabled onclick="transcribeAll()">All</button>
  </div>

  <!-- Toolbar -->

  <div class="toolbar">
    <div class="toolbar-label">Transcript</div>
    <button class="tool-btn" id="btn-cleanup" disabled onclick="aiAction('cleanup')">✨ Clean Up</button>
    <button class="tool-btn" id="btn-summarize" disabled onclick="aiAction('summarize')">📋 Summarize</button>
    <button class="tool-btn" id="btn-bullets" disabled onclick="aiAction('bullets')">• Key Points</button>
    <button class="tool-btn" id="btn-copy" disabled onclick="copyTranscript()">Copy</button>
    <button class="tool-btn" id="btn-download" disabled onclick="downloadTranscript()">Save .txt</button>
  </div>

  <!-- Transcript -->

  <textarea id="transcript" placeholder="Your transcript will appear here after transcribing. You can also type or paste text directly." oninput="onTranscriptEdit()"></textarea>

  <!-- AI panel -->

  <div class="ai-panel">
    <div class="ai-row">
      <textarea id="ai-prompt" placeholder="Ask Claude: 'Fix grammar', 'Summarize in one sentence', 'Extract names mentioned'…"></textarea>
      <button class="ai-send-btn" id="ai-send-btn" onclick="sendCustomPrompt()">Ask Claude</button>
    </div>
    <div id="ai-result"></div>
    <div class="ai-result-actions" id="ai-result-actions">
      <button class="result-action-btn" onclick="replaceWithResult()">Replace transcript</button>
      <button class="result-action-btn" onclick="appendResult()">Append</button>
      <button class="result-action-btn" onclick="copyResult()">Copy</button>
      <button class="result-action-btn" onclick="dismissResult()">✕</button>
    </div>
  </div>

</div>

<!-- Progress overlay -->

<div id="progress-overlay">
  <div class="progress-box">
    <div class="spinner"></div>
    <p id="progress-msg">Reading file…</p>
    <small id="progress-sub">This may take a moment for large files</small>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  let files = [];
  let selectedIndex = -1;
  let transcripts = {};
  let lastAiResult = '';

  // ── Load saved keys ──
  window.addEventListener('DOMContentLoaded', () => {
    try {
      const ok = localStorage.getItem('vms_openai_key');
      const ak = localStorage.getItem('vms_anthropic_key');
      if (ok) { document.getElementById('openai-key').value = ok; document.getElementById('openai-badge').style.display = 'inline'; }
      if (ak) { document.getElementById('anthropic-key').value = ak; document.getElementById('anthropic-badge').style.display = 'inline'; }
    } catch(e) {}
  });

  function saveKeys() {
    try {
      const ok = document.getElementById('openai-key').value.trim();
      const ak = document.getElementById('anthropic-key').value.trim();
      if (ok) { localStorage.setItem('vms_openai_key', ok); document.getElementById('openai-badge').style.display = 'inline'; }
      if (ak) { localStorage.setItem('vms_anthropic_key', ak); document.getElementById('anthropic-badge').style.display = 'inline'; }
    } catch(e) {}
  }

  function toggleKey(id) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
  }

  // ── File input ──
  document.getElementById('file-input').addEventListener('change', function() {
    const newFiles = Array.from(this.files);
    newFiles.forEach(f => {
      if (!files.find(x => x.name === f.name && x.size === f.size)) {
        files.push({ file: f, name: f.name, status: 'ready' });
      }
    });
    this.value = '';
    renderFileList();
    updateButtons();
    if (selectedIndex < 0 && files.length > 0) selectFile(0);
  });

  function renderFileList() {
    const list = document.getElementById('file-list');
    if (!files.length) {
      list.innerHTML = '<div style="color:var(--muted); font-size:0.73rem; padding:0.5rem 0;">No files added yet</div>';
      return;
    }
    list.innerHTML = files.map((f, i) => `
      <div class="file-item ${i === selectedIndex ? 'active' : ''}" onclick="selectFile(${i})">
        <span>🎵</span>
        <span class="file-name" title="${f.name}">${f.name}</span>
        <span class="file-status status-${f.status}">${f.status}</span>
      </div>
    `).join('');
  }

  function selectFile(i) {
    selectedIndex = i;
    renderFileList();
    const ta = document.getElementById('transcript');
    const key = files[i]?.name;
    ta.value = transcripts[key] || '';
    ta.placeholder = transcripts[key] ? '' : 'Tap "Transcribe Selected" to transcribe this file.';
    updateButtons();
    updateToolbar();
  }

  function onTranscriptEdit() {
    if (selectedIndex >= 0) transcripts[files[selectedIndex].name] = document.getElementById('transcript').value;
    updateToolbar();
  }

  function updateButtons() {
    document.getElementById('transcribe-btn').disabled = selectedIndex < 0;
    document.getElementById('transcribe-all-btn').disabled = !files.length;
  }

  function updateToolbar() {
    const has = document.getElementById('transcript').value.trim().length > 0;
    ['btn-cleanup','btn-summarize','btn-bullets','btn-copy','btn-download'].forEach(id => {
      document.getElementById(id).disabled = !has;
    });
  }

  // ── Progress UI ──
  function showProgress(msg, sub) {
    document.getElementById('progress-msg').textContent = msg || 'Working…';
    document.getElementById('progress-sub').textContent = sub || '';
    document.getElementById('progress-bar').style.width = '0%';
    document.getElementById('progress-overlay').classList.add('visible');
  }

  function setProgress(pct) {
    document.getElementById('progress-bar').style.width = pct + '%';
  }

  function hideProgress() {
    document.getElementById('progress-overlay').classList.remove('visible');
  }

  // ── Core: read file as base64 — the only reliable method on iOS Safari/Chrome ──
  function readFileAsBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        // result is "data:audio/m4a;base64,AAAA..." — we just want the base64 part
        const base64 = reader.result.split(',')[1];
        resolve(base64);
      };
      reader.onerror = () => reject(new Error('Failed to read file. Try saving it to Files app first.'));
      reader.readAsDataURL(file);
    });
  }

  // Convert base64 back to a Blob for FormData upload
  function base64ToBlob(base64, mimeType) {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return new Blob([bytes], { type: mimeType });
  }

  // ── Transcription ──
  async function transcribeSelected() {
    if (selectedIndex < 0) return;
    await transcribeFile(selectedIndex);
  }

  async function transcribeAll() {
    for (let i = 0; i < files.length; i++) {
      if (files[i].status !== 'done') await transcribeFile(i);
    }
  }

  async function transcribeFile(i) {
    const openaiKey = document.getElementById('openai-key').value.trim();
    if (!openaiKey) { toast('Please enter your OpenAI API key'); return; }

    files[i].status = 'processing';
    renderFileList();

    try {
      // Step 1: read file as base64 (works on iOS Safari & Chrome)
      showProgress('Reading audio file…', 'Step 1 of 2');
      setProgress(20);
      const base64 = await readFileAsBase64(files[i].file);
      setProgress(50);

      // Step 2: convert to blob and send to Whisper
      showProgress('Transcribing with Whisper…', 'Step 2 of 2 — may take 10–30 seconds');
      setProgress(60);

      const mimeType = files[i].file.type || 'audio/m4a';
      const ext = files[i].name.split('.').pop() || 'm4a';
      const audioBlob = base64ToBlob(base64, mimeType);
      const audioFile = new File([audioBlob], `recording.${ext}`, { type: mimeType });

      const formData = new FormData();
      formData.append('file', audioFile);
      formData.append('model', 'whisper-1');

      const res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${openaiKey}` },
        body: formData
      });

      setProgress(90);

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `OpenAI error ${res.status}`);
      }

      const data = await res.json();
      setProgress(100);

      transcripts[files[i].name] = data.text;
      files[i].status = 'done';
      renderFileList();

      if (i === selectedIndex) {
        document.getElementById('transcript').value = data.text;
        updateToolbar();
      }

      hideProgress();
      toast(`✓ Done: ${files[i].name}`);

    } catch (err) {
      hideProgress();
      files[i].status = 'error';
      renderFileList();
      toast('Error: ' + err.message);
      console.error(err);
    }
  }

  // ── AI ──
  async function aiAction(type) {
    const text = document.getElementById('transcript').value.trim();
    if (!text) return;
    const prompts = {
      cleanup: 'Clean up this voice memo transcript. Fix grammar and punctuation, remove filler words (um, uh, like, you know). Keep the meaning and tone. Return only the cleaned text.',
      summarize: 'Summarize this voice memo transcript in 2–3 concise paragraphs.',
      bullets: 'Extract the key points, decisions, and action items from this transcript as a clean bulleted list.'
    };
    await callClaude(prompts[type], text);
  }

  async function sendCustomPrompt() {
    const prompt = document.getElementById('ai-prompt').value.trim();
    const text = document.getElementById('transcript').value.trim();
    if (!prompt) { toast('Please type a prompt first'); return; }
    await callClaude(prompt, text);
  }

  async function callClaude(instruction, transcriptText) {
    const key = document.getElementById('anthropic-key').value.trim();
    if (!key) { toast('Please enter your Anthropic API key'); return; }

    const btn = document.getElementById('ai-send-btn');
    const resultEl = document.getElementById('ai-result');
    const actionsEl = document.getElementById('ai-result-actions');

    btn.disabled = true;
    resultEl.textContent = 'Claude is thinking…';
    resultEl.classList.add('visible');
    actionsEl.classList.remove('visible');

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 2048,
          system: transcriptText
            ? `You are a helpful assistant editing a voice memo transcript. Transcript:\n\n${transcriptText}`
            : 'You are a helpful assistant.',
          messages: [{ role: 'user', content: instruction }]
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `Anthropic error ${res.status}`);
      }

      const data = await res.json();
      lastAiResult = data.content[0]?.text || '';
      resultEl.textContent = lastAiResult;
      actionsEl.classList.add('visible');

    } catch(err) {
      resultEl.textContent = 'Error: ' + err.message;
    } finally {
      btn.disabled = false;
    }
  }

  function replaceWithResult() {
    document.getElementById('transcript').value = lastAiResult;
    onTranscriptEdit();
    dismissResult();
    toast('Transcript replaced');
  }

  function appendResult() {
    const ta = document.getElementById('transcript');
    ta.value = ta.value.trim() + '\n\n---\n\n' + lastAiResult;
    onTranscriptEdit();
    dismissResult();
    toast('Appended');
  }

  function copyResult() { copyText(lastAiResult); }

  function copyTranscript() { copyText(document.getElementById('transcript').value); }

  function copyText(text) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => toast('Copied!')).catch(() => fallbackCopy(text));
    } else { fallbackCopy(text); }
  }

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); toast('Copied!'); }
    catch(e) { toast('Please copy manually'); }
    document.body.removeChild(ta);
  }

  function dismissResult() {
    document.getElementById('ai-result').classList.remove('visible');
    document.getElementById('ai-result-actions').classList.remove('visible');
    lastAiResult = '';
  }

  function downloadTranscript() {
    const text = document.getElementById('transcript').value;
    const name = selectedIndex >= 0 ? files[selectedIndex].name.replace(/\.[^.]+$/, '') : 'transcript';
    const blob = new Blob([text], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name + '_transcript.txt';
    a.click();
    toast('Saved!');
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }
</script>

</body>
</html>
